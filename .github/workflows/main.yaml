name: main

on:
  push:
    branches: [main, test-me-*]
    tags: '*'
  pull_request:

jobs:
  main-linux:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: asottile/workflows/.github/actions/fast-checkout@v1.5.0
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          architecture: "x64"
      - run: python -m pip install -U pip
      - run: pip install pytest
      - run: pytest tests
